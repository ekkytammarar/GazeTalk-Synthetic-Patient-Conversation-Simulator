<script>
/* =======================
   GLOBAL STATE
======================= */
const BUILT_IN_PERSONAS = [...]; // ⚠ keep your personas exactly as-is

let selectedPersona = null;
let sessionLog = [];

/* =======================
   UI HELPERS
======================= */
function updateRunBtn() {
  document.getElementById("runBtn").disabled = !selectedPersona;
}

function renderPersonas() {
  const list = document.getElementById("personaList");
  list.innerHTML = "";

  BUILT_IN_PERSONAS.forEach((p, i) => {
    const div = document.createElement("div");
    div.className = "persona-card";
    div.onclick = () => selectPersona(p, i);
    div.innerHTML = `
      <div class="persona-name">${p.display_name}</div>
      <div class="persona-meta">${p.patient_id} · ${p.age_group} · ${p.country_or_culture}</div>
    `;
    list.appendChild(div);
  });
}

function selectPersona(p) {
  selectedPersona = p;
  updateRunBtn();
}

/* =======================
   CUSTOM PERSONA (FIXED)
======================= */
function selectCustom() {
  selectedPersona = {
    patient_id: "CUSTOM_001",
    display_name: document.getElementById("cName").value || "Patient",
    country_or_culture: document.getElementById("cCulture").value || "Denmark",
    age_group: document.getElementById("cAge").value,
    gender: document.getElementById("cGender").value,
    interests: document.getElementById("cInterests").value.split(",").map(s => s.trim()).filter(Boolean),
    daily_routines: document.getElementById("cRoutines").value.split(",").map(s => s.trim()).filter(Boolean),
    communication_goals: document.getElementById("cGoals").value.split(",").map(s => s.trim()).filter(Boolean),
    aphasia_severity: document.getElementById("cSeverity").value,
    system_familiarity: parseFloat(document.getElementById("cFamiliarity").value) || 0.5,
    fatigue_sensitivity: 1.0
  };

  updateRunBtn();
  document.getElementById("runStatus").textContent =
    "✓ Custom persona selected: " + selectedPersona.display_name;
}

/* =======================
   METRICS (FIXED)
======================= */
function estimateLIX(text) {
  const words = text.trim().split(/\s+/).filter(Boolean);
  const sentences = text.split(/[.!?]+/).filter(s => s.trim());
  const longWords = words.filter(w => w.length > 6);

  if (sentences.length === 0 || words.length === 0) return 0;

  return Math.round(
    (words.length / sentences.length) +
    (longWords.length * 100 / words.length)
  );
}

/* =======================
   CLAUDE CALL (BACKEND)
======================= */
async function callClaude(systemPrompt, messages) {
  const res = await fetch("/chat", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      model: "claude-3-5-sonnet-20240620",
      max_tokens: 400,
      system: systemPrompt,
      messages
    })
  });

  const data = await res.json();
  if (data.error) throw new Error(data.error.message);
  return data.content[0].text.trim();
}

/* =======================
   INIT
======================= */
renderPersonas();
</script>
``
