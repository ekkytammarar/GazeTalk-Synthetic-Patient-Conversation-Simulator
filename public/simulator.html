<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>GazeTalk Synthetic Patient Simulator</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <style>
    body {
      background: #0b1020;
      color: #e5e7eb;
      font-family: Arial, sans-serif;
      padding: 24px;
    }

    h1 { margin-bottom: 8px; }

    .layout {
      display: grid;
      grid-template-columns: 300px 1fr;
      gap: 16px;
      max-width: 1100px;
    }

    .card {
      background: #111827;
      border: 1px solid #1f2937;
      border-radius: 8px;
      padding: 16px;
    }

    .persona {
      border: 1px solid #374151;
      padding: 10px;
      border-radius: 6px;
      margin-bottom: 8px;
      cursor: pointer;
    }

    .persona:hover { background: #1e293b; }
    .persona.active {
      background: #1d4ed8;
      border-color: #60a5fa;
    }

    button {
      width: 100%;
      margin-top: 12px;
      padding: 10px;
      font-weight: bold;
      cursor: pointer;
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .chat {
      background: #020617;
      border-radius: 6px;
      padding: 12px;
      height: 320px;
      overflow-y: auto;
      font-size: 14px;
    }

    .msg { margin-bottom: 10px; line-height: 1.5; }
    .therapist { color: #93c5fd; }
    .patient { color: #fde68a; text-align: right; }
    .error { color: #f87171; }

    .selected-patient {
      margin-bottom: 8px;
      font-size: 13px;
      color: #a5b4fc;
    }
  </style>
</head>

<body>

<h1>GazeTalk Synthetic Patient Simulator</h1>

<div class="layout">

  <!-- LEFT: PATIENT PERSONAS -->
  <div class="card">
    <h3>Patient Personas</h3>
    <div id="personaList"></div>
    <button id="runBtn" disabled>▶ Run Simulation</button>
  </div>

  <!-- RIGHT: CONVERSATION -->
  <div class="card">
    <h3>Conversation</h3>
    <div id="selectedPatient" class="selected-patient">
      No patient selected
    </div>
    <div id="chat" class="chat"></div>
  </div>

</div>

<script>
document.addEventListener("DOMContentLoaded", () => {

  const personas = [
    { name: "Henrik Sørensen", severity: "moderate" },
    { name: "Birte Andersen", severity: "severe" }
  ];

  let selectedPersona = null;

  const personaList = document.getElementById("personaList");
  const runBtn = document.getElementById("runBtn");
  const chat = document.getElementById("chat");
  const selectedPatientLabel = document.getElementById("selectedPatient");

  function addMessage(role, text, isError = false) {
    const div = document.createElement("div");
    div.className = `msg ${role} ${isError ? "error" : ""}`;
    div.textContent = text;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
  }

  // Render personas
  personas.forEach(p => {
    const div = document.createElement("div");
    div.className = "persona";
    div.textContent = `${p.name} (${p.severity} aphasia)`;

    div.onclick = () => {
      document.querySelectorAll(".persona")
        .forEach(el => el.classList.remove("active"));

      div.classList.add("active");
      selectedPersona = p;
      runBtn.disabled = false;
      selectedPatientLabel.textContent =
        `Patient: ${p.name} — ${p.severity} aphasia`;
    };

    personaList.appendChild(div);
  });

  // Run simulation
  runBtn.onclick = async () => {
    if (!selectedPersona) return;

    chat.innerHTML = "";
    addMessage("therapist", "Hello! How are you today?");

    try {
      const response = await fetch("/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "claude-3-haiku-latest",
          max_tokens: 200,
          system:
            `You are ${selectedPersona.name}, a patient with `
            + `${selectedPersona.severity} aphasia. `
            + `Respond briefly and naturally, with aphasia-appropriate language.`,
          messages: [
            { role: "user", content: "Hello! How are you today?" }
          ]
        })
      });

      const data = await response.json();

      if (!response.ok) {
        throw new Error(data?.error?.message || "Backend error");
      }

      addMessage("patient", data.content[0].text);

    } catch (err) {
      addMessage("therapist", `Error: ${err.message}`, true);
    }
  };

});
</script>

</body>
</html>
