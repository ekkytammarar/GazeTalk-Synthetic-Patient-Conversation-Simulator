<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>GazeTalk Synthetic Patient Simulator</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <style>
    body {
      background:#0b1020;
      color:#e5e7eb;
      font-family:Arial,sans-serif;
      padding:24px;
    }
    h1 { margin-bottom:8px; }
    .layout {
      display:grid;
      grid-template-columns:320px 1fr;
      gap:16px;
      max-width:1100px;
    }
    .card {
      background:#111827;
      border:1px solid #1f2937;
      border-radius:8px;
      padding:16px;
    }
    .persona {
      border:1px solid #374151;
      padding:10px;
      border-radius:6px;
      margin-bottom:8px;
      cursor:pointer;
    }
    .persona:hover { background:#1e293b; }
    .persona.active {
      background:#1d4ed8;
      border-color:#60a5fa;
    }
    button {
      width:100%;
      margin-top:12px;
      padding:10px;
      font-weight:bold;
      cursor:pointer;
    }
    .chat {
      background:#020617;
      border-radius:6px;
      padding:12px;
      height:380px;
      overflow-y:auto;
      font-size:14px;
    }
    .msg { margin-bottom:10px; line-height:1.5; }
    .therapist { color:#93c5fd; }
    .patient { color:#fde68a; text-align:right; }
    .selected {
      font-size:13px;
      color:#a5b4fc;
      margin-bottom:6px;
    }
  </style>
</head>

<body>

<h1>GazeTalk Synthetic Patient Simulator</h1>

<div class="layout">

  <div class="card">
    <h3>Patient Personas</h3>
    <p style="font-size:12px;color:#9ca3af">
      Select a patient to begin
    </p>
    <div id="personaList"></div>
    <button id="runBtn" disabled>▶ Run Simulation</button>
  </div>

  <div class="card">
    <h3>Conversation</h3>
    <div id="selectedPatient" class="selected">
      No patient selected
    </div>
    <div id="chat" class="chat"></div>
  </div>

</div>

<script>
document.addEventListener("DOMContentLoaded", () => {

  // ------------------------------
  // Qianyi-style dialogue policy
  // ------------------------------

  const MAX_TURNS = 6;                 // fixed, deterministic
  const TURN_DELAY_MS = 400;

  let turnIndex = 0;
  let conversation = [];

  // Therapist prompt lists (fixed vocabulary)
  const OPENING = [
    "Hello! How are you today?",
    "Nice to talk again. How is your day going?"
  ];

  const FOLLOW_UP = [
    "Please go on.",
    "Tell me more.",
    "I am listening."
  ];

  const CLOSING = [
    "Okay. Let us stop here for today.",
    "Thank you. We can continue another time."
  ];

  function pick(arr) {
    return arr[Math.floor(Math.random()*arr.length)];
  }

  function explicitStop(text) {
    return /stop|enough|done/i.test(text.toLowerCase());
  }

  // ------------------------------
  // Personas (identity only)
  // ------------------------------

  const personas = [
    {
      name:"Henrik Sørensen",
      severity:"moderate",
      description:
        "Moderate aphasia. Short sentences. Pauses and gestures. Socially aware."
    },
    {
      name:"Birte Andersen",
      severity:"severe",
      description:
        "Severe aphasia. Very short utterances. Long pauses. Fatigues quickly."
    }
  ];

  let selectedPersona = null;

  const personaList = document.getElementById("personaList");
  const chat = document.getElementById("chat");
  const runBtn = document.getElementById("runBtn");
  const selectedLabel = document.getElementById("selectedPatient");

  function add(role,text) {
    const d = document.createElement("div");
    d.className = `msg ${role}`;
    d.textContent = text;
    chat.appendChild(d);
    chat.scrollTop = chat.scrollHeight;
  }

  personas.forEach(p => {
    const div = document.createElement("div");
    div.className="persona";
    div.textContent = `${p.name} (${p.severity} aphasia)`;
    div.onclick = () => {
      document.querySelectorAll(".persona")
        .forEach(e=>e.classList.remove("active"));
      div.classList.add("active");
      selectedPersona = p;
      runBtn.disabled = false;
      selectedLabel.textContent =
        `Patient: ${p.name} — ${p.severity} aphasia`;
    };
    personaList.appendChild(div);
  });

  // ------------------------------
  // Run simulation
  // ------------------------------

  runBtn.onclick = async () => {
    if (!selectedPersona) return;

    chat.innerHTML = "";
    conversation = [];
    turnIndex = 0;

    // Opening (therapist always speaks first)
    const opening = pick(OPENING);
    add("therapist", opening);
    conversation.push({ role:"user", content:opening });

    while (turnIndex < MAX_TURNS) {
      turnIndex++;

      try {
        // Patient response (Claude)
        const r = await fetch("/chat", {
          method:"POST",
          headers:{ "Content-Type":"application/json" },
          body: JSON.stringify({
            model:"claude-sonnet-4-6",
            max_tokens:200,
            system:
              `You are ${selectedPersona.name}, a patient with ${selectedPersona.severity} aphasia. `
              + `${selectedPersona.description} `
              + `Express hesitation, pauses, and gestures naturally. `
              + `Do not explain aphasia.`,
            messages:conversation
          })
        });

        const data = await r.json();
        const patientReply = data.content[0].text;

        add("patient", patientReply);
        conversation.push({ role:"assistant", content:patientReply });

        // Explicit stop → therapist closes once
        if (explicitStop(patientReply)) {
          const close = pick(CLOSING);
          add("therapist", close);
          break;
        }

        // Otherwise therapist continues once
        if (turnIndex < MAX_TURNS) {
          await new Promise(res=>setTimeout(res, TURN_DELAY_MS));
          const follow = pick(FOLLOW_UP);
          add("therapist", follow);
          conversation.push({ role:"user", content:follow });
        }

      } catch {
        add("therapist","Error occurred. Ending session.");
        break;
      }
    }
  };

});
</script>
</body>
</html>
