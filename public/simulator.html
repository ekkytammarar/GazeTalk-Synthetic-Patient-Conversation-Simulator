<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>GazeTalk Synthetic Patient Simulator</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body {
      background: #0b1020;
      color: #e5e7eb;
      font-family: Arial, sans-serif;
      padding: 24px;
    }
    h1 { margin-bottom: 8px; }
    .layout {
      display: grid;
      grid-template-columns: 320px 1fr;
      gap: 16px;
      max-width: 1100px;
    }
    .card {
      background: #111827;
      border: 1px solid #1f2937;
      border-radius: 8px;
      padding: 16px;
    }
    .persona {
      border: 1px solid #374151;
      padding: 10px;
      border-radius: 6px;
      margin-bottom: 8px;
      cursor: pointer;
    }
    .persona:hover { background: #1e293b; }
    .persona.active {
      background: #1d4ed8;
      border-color: #60a5fa;
    }
    button {
      width: 100%;
      margin-top: 12px;
      padding: 10px;
      font-weight: bold;
      cursor: pointer;
    }
    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .chat {
      background: #020617;
      border-radius: 6px;
      padding: 12px;
      height: 360px;
      overflow-y: auto;
      font-size: 14px;
    }
    .msg { margin-bottom: 10px; line-height: 1.5; }
    .therapist { color: #93c5fd; }
    .patient { color: #fde68a; text-align: right; }
    .error { color: #f87171; }
    .selected-patient {
      font-size: 13px;
      color: #a5b4fc;
      margin-bottom: 8px;
    }
  </style>
</head>

<body>

<h1>GazeTalk Synthetic Patient Simulator</h1>

<div class="layout">

  <div class="card">
    <h3>Patient Personas</h3>
    <p style="font-size:12px;color:#9ca3af">Select a patient to start a session</p>
    <div id="personaList"></div>
    <button id="runBtn" disabled>▶ Run Simulation</button>
  </div>

  <div class="card">
    <h3>Conversation</h3>
    <div id="selectedPatient" class="selected-patient">No patient selected</div>
    <div id="chat" class="chat"></div>
  </div>

</div>

<script>
document.addEventListener("DOMContentLoaded", () => {

  const MAX_TURNS = 8;
  const TURN_DELAY_MS = 500;

  let lastTherapistReply = null;

  function pickRandom(arr) {
    return arr[Math.floor(Math.random() * arr.length)];
  }

  function patientAsksQuestion(text) {
    return /\?$|\byou\b/i.test(text.toLowerCase());
  }

  function patientSignalsInteractionProblem(text) {
    return /same|again|not right|stop|something.*wrong|you keep/i.test(
      text.toLowerCase()
    );
  }

  const OPENING_PROMPTS = [
    "Hello! How are you today?",
    "Good to see you. How is your day going?",
    "Hi there. How are you feeling right now?",
    "Nice to talk again. How is your morning?"
  ];

  const FOLLOW_UP_PROMPTS = [
    "Can you tell me a little more?",
    "What else is on your mind?",
    "Can you say more about that?",
    "What feels important right now?",
    "I’m listening. Go on."
  ];

  const personas = [
    {
      name: "Henrik Sørensen",
      severity: "moderate",
      description: "Short sentences, word-finding pauses, aware of repetition."
    },
    {
      name: "Birte Andersen",
      severity: "severe",
      description: "Very short phrases, long pauses, strong fatigue cues."
    }
  ];

  let selectedPersona = null;

  const personaList = document.getElementById("personaList");
  const runBtn = document.getElementById("runBtn");
  const chat = document.getElementById("chat");
  const selectedPatientLabel = document.getElementById("selectedPatient");

  function addMessage(role, text, isError=false) {
    const div = document.createElement("div");
    div.className = `msg ${role} ${isError ? "error" : ""}`;
    div.textContent = text;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
  }

  personas.forEach(p => {
    const div = document.createElement("div");
    div.className = "persona";
    div.textContent = `${p.name} (${p.severity} aphasia)`;
    div.onclick = () => {
      document.querySelectorAll(".persona").forEach(el => el.classList.remove("active"));
      div.classList.add("active");
      selectedPersona = p;
      runBtn.disabled = false;
      selectedPatientLabel.textContent =
        `Patient: ${p.name} — ${p.severity} aphasia`;
    };
    personaList.appendChild(div);
  });

  runBtn.onclick = async () => {
    if (!selectedPersona) return;

    chat.innerHTML = "";
    lastTherapistReply = null;
    let conversation = [];

    const opening = pickRandom(OPENING_PROMPTS);
    addMessage("therapist", opening);
    conversation.push({ role: "user", content: opening });

    for (let turn = 1; turn <= MAX_TURNS; turn++) {
      try {
        const response = await fetch("/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            model: "claude-sonnet-4-6",
            max_tokens: 240,
            system:
              `You are ${selectedPersona.name}, a patient with ${selectedPersona.severity} aphasia. `
              + `${selectedPersona.description} Use pauses and gestures naturally. `
              + `Do not explain your condition.`,
            messages: conversation
          })
        });

        const data = await response.json();
        if (!response.ok) throw new Error(data?.error?.message || "API error");

        const patientReply = data.content[0].text;
        addMessage("patient", patientReply);
        conversation.push({ role: "assistant", content: patientReply });

        const asksQuestion = patientAsksQuestion(patientReply);
        const fatigued = /tired|enough|done|stop/i.test(patientReply);
        const interactionProblem = patientSignalsInteractionProblem(patientReply);

        await new Promise(r => setTimeout(r, TURN_DELAY_MS));

        let therapistReply;

        if (interactionProblem) {
          therapistReply =
            "Thank you for telling me. I hear that this doesn’t feel right today. "
            + "We can stop here and continue another time.";
          addMessage("therapist", therapistReply);
          break;
        }

        if (asksQuestion) {
          therapistReply =
            "Thank you for asking — I’m doing well. "
            + "It sounds like today takes effort. "
            + "We can slow down, or stop if you like.";
        } else {
          therapistReply = pickRandom(FOLLOW_UP_PROMPTS);
        }

        if (therapistReply === lastTherapistReply) {
          therapistReply =
            "I notice I’m repeating myself. Thank you for pointing that out. "
            + "Let’s stop here for today.";
          addMessage("therapist", therapistReply);
          break;
        }

        addMessage("therapist", therapistReply);
        conversation.push({ role: "user", content: therapistReply });
        lastTherapistReply = therapistReply;

        if (fatigued && !asksQuestion) break;

      } catch (err) {
        addMessage("therapist", `Error: ${err.message}`, true);
        break;
      }
    }
  };

});
</script>

</body>
</html>
