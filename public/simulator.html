<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>GazeTalk Synthetic Patient Simulator</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      margin: 0;
      padding: 24px;
      background: #0b1020;
      color: #e5e7eb;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
    }

    h1 {
      margin-bottom: 6px;
      font-size: 28px;
    }

    p {
      margin-bottom: 16px;
      color: #9ca3af;
    }

    .layout {
      display: grid;
      grid-template-columns: 280px 1fr;
      gap: 16px;
      max-width: 1100px;
      margin: auto;
    }

    .card {
      background: #111827;
      border: 1px solid #1f2937;
      border-radius: 8px;
      padding: 16px;
    }

    .persona {
      padding: 10px;
      border-radius: 6px;
      border: 1px solid #374151;
      cursor: pointer;
      margin-bottom: 8px;
      transition: background 0.15s, border-color 0.15s;
    }

    .persona:hover {
      background: #172554;
    }

    .persona.active {
      background: #1d4ed8;
      border-color: #60a5fa;
    }

    button {
      width: 100%;
      margin-top: 12px;
      padding: 10px;
      font-weight: 600;
      border-radius: 6px;
      border: none;
      background: #2563eb;
      color: white;
      cursor: pointer;
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .chat {
      background: #020617;
      border-radius: 6px;
      padding: 12px;
      min-height: 240px;
      max-height: 420px;
