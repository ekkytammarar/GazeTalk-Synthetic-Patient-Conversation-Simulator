<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>GazeTalk Synthetic Patient Simulator</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body {
      background:#0b1020;
      color:#e5e7eb;
      font-family:Arial,sans-serif;
      padding:24px;
    }
    h1 { margin-bottom:8px; }
    .layout {
      display:grid;
      grid-template-columns:360px 1fr;
      gap:16px;
      max-width:1200px;
    }
    .card {
      background:#111827;
      border:1px solid #1f2937;
      border-radius:8px;
      padding:16px;
    }
    .persona {
      border:1px solid #374151;
      padding:10px;
      border-radius:6px;
      margin-bottom:8px;
      cursor:pointer;
    }
    .persona:hover { background:#1e293b; }
    .persona.active {
      background:#1d4ed8;
      border-color:#60a5fa;
    }
    .meta {
      font-size:12px;
      color:#c7d2fe;
      margin-top:4px;
    }
    button {
      width:100%;
      margin-top:12px;
      padding:10px;
      font-weight:bold;
      cursor:pointer;
    }
    .chat {
      background:#020617;
      border-radius:6px;
      padding:12px;
      height:420px;
      overflow-y:auto;
      font-size:14px;
    }
    .msg { margin-bottom:10px; line-height:1.5; }
    .therapist { color:#93c5fd; }
    .patient { color:#fde68a; text-align:right; }
    .selected {
      font-size:13px;
      color:#a5b4fc;
      margin-bottom:6px;
    }
  </style>
</head>

<body>

<h1>GazeTalk Synthetic Patient Simulator</h1>

<div class="layout">

  <div class="card">
    <h3>Patient Personas</h3>
    <p style="font-size:12px;color:#9ca3af">
      Select a patient to begin
    </p>
    <div id="personaList"></div>
    <button id="runBtn" disabled>▶ Run Simulation</button>
  </div>

  <div class="card">
    <h3>Conversation</h3>
    <div id="selectedPatient" class="selected">
      No patient selected
    </div>
    <div id="chat" class="chat"></div>
  </div>

</div>

<script>
document.addEventListener("DOMContentLoaded", () => {

  /* ===============================
     QIANyi‑STYLE DIALOGUE RULES
  =============================== */

  const MAX_TURNS = 6;
  const TURN_DELAY_MS = 400;

  let conversation = [];
  let turnIndex = 0;

  const OPENING_PROMPTS = [
    "Hello! How are you today?",
    "Nice to talk again. How is your day going?"
  ];

  const FOLLOW_UP_PROMPTS = [
    "Please go on.",
    "Tell me more.",
    "I am listening."
  ];

  const CLOSING_PROMPTS = [
    "Okay. Let us stop here for today.",
    "Thank you. We can continue another time."
  ];

  function pick(arr) {
    return arr[Math.floor(Math.random() * arr.length)];
  }

  function explicitStop(text) {
    return /stop|enough|done/i.test(text.toLowerCase());
  }

  /* ===============================
     QIANyi PERSONAS (ORIGINAL)
  =============================== */

  const personas = [
    {
      patient_id: "CN_F_58_001",
      display_name: "Ms. Lin",
      country_or_culture: "China",
      age_group: "50+",
      gender: "female",
      interests: ["cooking","family","shopping","weather"],
      daily_routines: ["cook breakfast","go market","call daughter"],
      communication_goals: ["daily needs","family chat"],
      aphasia_severity: "severe"
    },
    {
      patient_id: "DK_M_29_001",
      display_name: "Mr. Mads",
      country_or_culture: "Denmark",
      age_group: "20-35",
      gender: "male",
      interests: ["football","friends","gym","coffee"],
      daily_routines: ["bike commute","gym","coffee with friends"],
      communication_goals: ["social chat","daily planning"],
      aphasia_severity: "moderate"
    },
    {
      patient_id: "IT_M_71_001",
      display_name: "Mr. Paolo",
      country_or_culture: "Italy",
      age_group: "65+",
      gender: "male",
      interests: ["garden","family","coffee","weather"],
      daily_routines: ["garden walk","coffee","family lunch"],
      communication_goals: ["family visit","health needs"],
      aphasia_severity: "severe"
    },
    {
      patient_id: "ID_F_41_001",
      display_name: "Ms. Ayu",
      country_or_culture: "Indonesia",
      age_group: "35-55",
      gender: "female",
      interests: ["family","religion","cooking"],
      daily_routines: ["family meal","prayer","market shopping"],
      communication_goals: ["family chat","daily needs"],
      aphasia_severity: "moderate"
    }
  ];

  let selectedPersona = null;
  const personaList = document.getElementById("personaList");
  const chat = document.getElementById("chat");
  const runBtn = document.getElementById("runBtn");
  const selectedLabel = document.getElementById("selectedPatient");

  function add(role, text) {
    const d = document.createElement("div");
    d.className = `msg ${role}`;
    d.textContent = text;
    chat.appendChild(d);
    chat.scrollTop = chat.scrollHeight;
  }

  personas.forEach(p => {
    const div = document.createElement("div");
    div.className = "persona";
    div.innerHTML = `
      <strong>${p.display_name}</strong>
      <div class="meta">
        ${p.country_or_culture} · ${p.age_group} · ${p.aphasia_severity} aphasia
      </div>
    `;
    div.onclick = () => {
      document.querySelectorAll(".persona")
        .forEach(e => e.classList.remove("active"));
      div.classList.add("active");
      selectedPersona = p;
      runBtn.disabled = false;
      selectedLabel.textContent =
        `Patient: ${p.display_name} — ${p.country_or_culture}`;
    };
    personaList.appendChild(div);
  });

  /* ===============================
     RUN SIMULATION
  =============================== */

  runBtn.onclick = async () => {
    if (!selectedPersona) return;

    chat.innerHTML = "";
    conversation = [];
    turnIndex = 0;

    const opening = pick(OPENING_PROMPTS);
    add("therapist", opening);
    conversation.push({ role:"user", content: opening });

    while (turnIndex < MAX_TURNS) {
      turnIndex++;

      const response = await fetch("/chat", {
        method:"POST",
        headers:{ "Content-Type":"application/json" },
        body: JSON.stringify({
          model:"claude-sonnet-4-6",
          max_tokens:200,
          system:
            "IMPORTANT: All questions and answers MUST be in English only.\n"
            + "Do not use non-English words or code-switching.\n\n"
            + `You are ${selectedPersona.display_name}, a ${selectedPersona.age_group} ${selectedPersona.gender} `
            + `from ${selectedPersona.country_or_culture}. `
            + `You have ${selectedPersona.aphasia_severity} aphasia.\n`
            + `Your interests include ${selectedPersona.interests.join(", ")}.\n`
            + `Your daily routines include ${selectedPersona.daily_routines.join(", ")}.\n`
            + `Your communication goals include ${selectedPersona.communication_goals.join(", ")}.\n`
            + "Use short, telegraphic speech with pauses and gestures.\n"
            + "Culture affects topic choice only, NOT language.\n"
            + "Do not explain aphasia.",
          messages: conversation
        })
      });

      const data = await response.json();
      const patientReply = data.content[0].text;

      add("patient", patientReply);
      conversation.push({ role:"assistant", content: patientReply });

      if (explicitStop(patientReply)) {
        add("therapist", pick(CLOSING_PROMPTS));
        break;
      }

      if (turnIndex < MAX_TURNS) {
        await new Promise(res => setTimeout(res, TURN_DELAY_MS));
        const follow = pick(FOLLOW_UP_PROMPTS);
        add("therapist", follow);
        conversation.push({ role:"user", content: follow });
      }
    }
  };

});
</script>

</body>
</html>
